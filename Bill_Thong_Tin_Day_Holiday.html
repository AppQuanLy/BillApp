            background-position: top center;
            background-repeat: no-repeat;
            background-size: 100% auto;
        }

        /* Header block bo góc mềm mại */
        .header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 15px;
            background-color: rgba(239, 202, 89, 0.8);
            padding: 15px;
            border-radius: 15px;
        }

        /* Vùng chứa Ảnh Header (Thay cho chữ) */
        .img-title-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .img-title-container img {
            width: 100%;
            max-width: 500px;
            height: auto;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }
        .img-title-container p {
            margin: 5px 0 0;
            font-size: 14pt;
            font-weight: bold;
            color: #111;
        }

        /* Lớp lót mờ cho khu vực Thông tin chung */
        .info-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 10px 5px;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 10px;
        }
        .info-item {
            font-size: 12pt;
        }
        .info-item .label {
            font-weight: bold;
            display: inline-block;
            width: 90px;
        }
        .info-item .value {
            font-weight: bold;
        }

        /* --- BẢNG DỮ LIỆU HOLIDAY THEME --- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-weight: bold;
        }
        th, td {
            border: 1px solid #cfd8dc;
            padding: 6px 8px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #b02d24; /* Nền Header đỏ thẫm */
            color: #efca59; /* Chữ vàng */
            font-weight: bold;
            text-transform: uppercase;
        }
        td {
            background-color: #efca59d4; /* Nền ô vàng trong suốt */
        }

        /* CÁC CLASS MÀU SẮC TRẠNG THÁI (Giữ nguyên logic S/C/V) */
        .status-cell.dead {
            background-color: rgba(217, 0, 0, 0.9) !important;
            color: white;
            font-weight: bold;
        }
        .status-cell.alive {
            background-color: rgba(0, 176, 80, 0.9) !important;
            color: white;
            font-weight: bold;
        }
        .status-cell.c-status {
            background-color: rgba(255, 204, 0, 0.9) !important; 
            color: #000; 
            font-weight: bold;
        }
        
        .total-row td {
            font-weight: bold;
            background-color: rgba(239, 202, 89, 0.95) !important; /* Nền vàng gold làm nổi bật dòng tổng */
            color: #111;
        }
        .text-blue { color: #0056b3; }
        .text-red { color: #d90000; font-weight: bold; }
        .font-bold { font-weight: bold; }
        
        /* Nút chức năng */
        .bill-controls {
            position: absolute;
            bottom: 1cm;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .bill-controls button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            cursor: pointer;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .bill-controls button:hover {
            transform: translateY(-2px);
        }
        .download-btn { background-color: #0275d8; } .download-btn:hover { background-color: #025aa5; }
        .copy-btn { background-color: #5bc0de; } .copy-btn:hover { background-color: #31b0d5; }
        .share-btn { background-color: #5cb85c; } .share-btn:hover { background-color: #449d44; }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .bill-controls { display: none !important; }
            body { background-color: #fff; padding: 0; margin: 0; }
            .container { box-shadow: none; border: none; margin: auto; padding-bottom: 1cm; }
        }
    </style>
</head>

<script>
    let billData = {};

    window.onload = function() {
        try {
            const encodedData = window.location.hash.substring(1);
            if (!encodedData) { throw new Error('Không tìm thấy dữ liệu.'); }
            const jsonData = decodeURIComponent(encodedData);
            billData = JSON.parse(jsonData);

            // Gộp danh sách từ nhiều mảng (hỗ trợ cả AppSheet cũ và mới)
            let arrOld = billData.danh_sach_chan || [];
            let arr1 = billData.danh_sach_chan_1 || [];
            let arr2 = billData.danh_sach_chan_2 || [];
            billData.danh_sach_chan = [...arrOld, ...arr1, ...arr2];

            generateBill(billData);
        } catch (error) {
            document.body.innerHTML = `<h2 style="color: red; text-align: center;">Lỗi tải dữ liệu!</h2><p style="text-align: center;">${error.message}</p>`;
            console.error("Lỗi:", error);
        }
    };

    function formatCurrency(num) {
        if (typeof num !== 'number' || num === null) return '';
        return num.toLocaleString('vi-VN');
    }

    function addPeriod(dateString, value, unit) {
        if (!dateString || typeof dateString !== 'string' || dateString.split('/').length !== 3) return "";
        
        const daysToAdd = Math.floor(parseFloat(value) || 0); 
        
        if (daysToAdd === 0 && !unit.toLowerCase().includes('tháng')) {
             return dateString;
        }

        const [day, month, year] = dateString.split('/');
        const date = new Date(+year, +month - 1, +day);
        if (isNaN(date.getTime())) return "";

        if ((unit || '').toLowerCase().includes('tháng')) {
            const originalDay = date.getDate();
            date.setDate(1);
            date.setMonth(date.getMonth() + daysToAdd);
            const lastDayOfNewMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            date.setDate(Math.min(originalDay, lastDayOfNewMonth));
        } else {
            date.setDate(date.getDate() + daysToAdd);
        }
        
        const newDay = String(date.getDate()).padStart(2, '0');
        const newMonth = String(date.getMonth() + 1).padStart(2, '0');
        const newYear = date.getFullYear();
        return `${newDay}/${newMonth}/${newYear}`;
    }

    function generateBill(data) {
        for (const key in data) {
            // Không tự động gán tham_san để xử lý riêng biệt bên dưới
            if (key !== 'danh_sach_chan' && key !== 'danh_sach_chan_1' && key !== 'danh_sach_chan_2' && key !== 'tham_san') {
                const element = document.querySelector(`[data-field="${key}"]`);
                if (element) element.textContent = data[key];
            }
        }
        
        // --- XỬ LÝ ẨN/HIỆN THĂM SÀN THÔNG MINH ---
        const rowThamSan = document.getElementById('row_tham_san');
        if (data.tham_san && data.tham_san.toString().trim() !== "") {
            // Định dạng tiền nếu là chuỗi số thuần
            const valThamSan = isNaN(data.tham_san) ? data.tham_san : formatCurrency(Number(data.tham_san));
            document.querySelector('[data-field="tham_san"]').textContent = valThamSan;
            rowThamSan.style.display = 'block'; // Hiển thị dòng này
        }
        // ------------------------------------------

        const tbody = document.getElementById('details-tbody');
        tbody.innerHTML = '';
        let tongTham = 0, tongTienHot = 0, tongTienDong = 0;

        if (data.danh_sach_chan && Array.isArray(data.danh_sach_chan)) {
            
            data.danh_sach_chan.sort((a, b) => {
                const kyA = parseInt(a.ky) || Infinity;
                const kyB = parseInt(b.ky) || Infinity;
                return kyA - kyB;
            });

            const ngayMo = data.ngay_mo;
            const kyHanValueFloat = parseFloat(data.ky_han_value) || 1; 

            const manKyDuKienEl = document.querySelector('[data-field="man_ky_du_kien"]');
            if (manKyDuKienEl) {
                const soKyInt = parseInt(data.so_ky) || 0;
                const periodsToAdd = (soKyInt - 1) * kyHanValueFloat;
                manKyDuKienEl.textContent = addPeriod(ngayMo, periodsToAdd, data.ky_han_unit);
            }

            data.danh_sach_chan.forEach((chan, index) => {
                const stt = index + 1;
                const kyHienThi = chan.ky || ""; 
                
                const row = document.createElement('tr');
                let ngayHienThi = chan.ngay; 

                const statusText = chan.status; 
                let statusClass = 'dead'; // Mặc định là X (Đỏ)

                // CẬP NHẬT LOGIC MÀU TRẠNG THÁI Ở ĐÂY
                if (statusText === 'V' || statusText === 'S') {
                    statusClass = 'alive'; // V là Xanh lá
                    const periodsToAdd = (stt - 1) * kyHanValueFloat;
                    ngayHienThi = addPeriod(ngayMo, periodsToAdd, data.ky_han_unit);
                } else if (statusText === 'C') {
                    statusClass = 'c-status'; // C là Vàng
                }
                
                const ngayClass = (statusText !== 'V' && statusText !== 'S') ? 'text-red' : '';
                
                row.innerHTML = `
                    <td>${stt}</td>
                    <td style="text-align: left;">${chan.ten_hui_vien}</td>
                    <td class="status-cell ${statusClass}">${statusText}</td>
                    <td class="${ngayClass} font-bold">${ngayHienThi || ''}</td>
                    <td>${kyHienThi}</td> 
                    <td>${formatCurrency(chan.tham)}</td>
                    <td>${formatCurrency(chan.tien_dong)}</td>
                    <td class="text-red font-bold">${formatCurrency(chan.tien_hot)}</td>
                `;
                tbody.appendChild(row);
                tongTham += chan.tham || 0;
                tongTienHot += chan.tien_hot || 0;
                tongTienDong += chan.tien_dong || 0;
            });
        }
        
        const totalRow = document.createElement('tr');
        totalRow.className = 'total-row';
        totalRow.innerHTML = `
            <td colspan="5" style="text-align: center; font-size: 14pt;">TỔNG:</td>
            <td class="text-blue">${formatCurrency(tongTham)}</td>
            <td>${formatCurrency(tongTienDong)}</td> 
            <td class="text-red">${formatCurrency(tongTienHot)}</td>
        `;
        tbody.appendChild(totalRow);
        
        const billElement = document.getElementById('bill-to-capture');
        document.querySelector('.download-btn').addEventListener('click', () => downloadBillAsImage(billElement));
        document.querySelector('.copy-btn').addEventListener('click', () => copyBillAsImage(billElement));
        document.querySelector('.share-btn').addEventListener('click', () => shareBillAsImage(billElement));
    }

    async function captureBill(element, callback) {
        const controls = element.querySelector('.bill-controls');
        if (controls) controls.style.display = 'none';
        
        // Nghỉ 0.5s để đảm bảo toàn bộ layout load xong chống lỗi iPhone
        await new Promise(resolve => setTimeout(resolve, 500));
        
        try {
            // Giảm scale xuống 1.5 hoặc 1.2 tùy nhu cầu để nhẹ máy, tránh tràn RAM
            const canvas = await html2canvas(element, { scale: 1.5, useCORS: true, allowTaint: false });
            await callback(canvas);
        } catch (error) {
            console.error('Lỗi khi tạo ảnh:', error);
            alert('Đã có lỗi xảy ra khi tạo ảnh. Vui lòng thử lại.');
        } finally {
            if (controls) controls.style.display = 'flex';
        }
    }

    function downloadBillAsImage(element) {
        const filename = `ThongTinDay_${billData.day_ten || 'bill'}.png`;
        captureBill(element, canvas => {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function copyBillAsImage(element) {
        captureBill(element, canvas => {
            canvas.toBlob(blob => {
                try {
                    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
                    .then(() => alert('Đã sao chép ảnh vào bộ nhớ tạm!'))
                    .catch(err => alert('Lỗi khi copy. Trình duyệt của bạn có thể không hỗ trợ.'));
                } catch (e) {
                    alert('Trình duyệt không hỗ trợ chức năng copy trực tiếp ảnh.');
                }
            });
        });
    }

    async function shareBillAsImage(element) {
        const filename = `ThongTinDay_${billData.day_ten || 'bill'}.png`;
        const textshare = `Thông tin dây hụi ${billData.day_ten}.`;
        
        const shareBtn = document.querySelector('.share-btn');
        const originalText = shareBtn.textContent;
        shareBtn.textContent = "⏳ Đang tạo...";
        shareBtn.disabled = true;

        if (!navigator.share) {
            alert('Trình duyệt không hỗ trợ chức năng này. Vui lòng dùng nút "Copy Bill" hoặc "Tải Bill".');
            shareBtn.textContent = originalText;
            shareBtn.disabled = false;
            return;
        }

        captureBill(element, async canvas => {
            try {
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                if (!blob) throw new Error("Không tạo được ảnh");
                const file = new File([blob], filename, { type: 'image/png' });
                
                await navigator.share({ title: `Thông Tin Dây Hụi`, text: textshare, files: [file] });
            } catch (error) { 
                if (error.name !== 'AbortError' && !error.message.includes('Share API')) {
                    console.error('Lỗi Share:', error);
                    alert("Có lỗi khi chia sẻ, vui lòng thử Tải Bill.");
                }
            } finally {
                shareBtn.textContent = originalText;
                shareBtn.disabled = false;
            }
        });
    }
</script>
